<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreativoyeooAgent - Generador de Campañas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <p class="subtitle">Generador de Campañas Publicitarias con IA</p>
        <button id="btn-edit-knowledge" class="btn-settings" title="Editar Base de Conocimiento"><i class="fas fa-sliders-h"></i> Configurar Agente</button>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <img src="portada.png" alt="CreativoyeooAgent - Generador de Campañas con IA" class="hero-image">
    </section>

    <main>
        <!-- Formulario -->
        <section class="card" id="form-section">
            <h2>Nueva Campaña</h2>
            <form id="campaign-form">
                <div class="form-group">
                    <label for="company_name">Nombre de la Empresa</label>
                    <input type="text" id="company_name" placeholder="Ej: Yeoo Software" required>
                </div>

                <div class="form-group">
                    <label for="ejes">Ejes Temáticos</label>
                    <textarea id="ejes" rows="3" placeholder="Ej: innovación tecnológica, transformación digital, soluciones empresariales" required></textarea>
                </div>

                <div class="form-group">
                    <label for="quantity">Cantidad de Piezas: <span id="qty-display">5</span>
                        <span class="info-tooltip" title="El límite actual es 5. Puede aumentarse hasta +100 imágenes/frases. Está reducido por costos de API.">
                            <i class="fas fa-circle-question"></i>
                        </span>
                    </label>
                    <input type="range" id="quantity" min="1" max="5" value="5">
                </div>

                <div class="form-group">
                    <label for="style">Estilo Visual</label>
                    <select id="style">
                        <option value="">Automático (variado)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Documentos de Marca (opcional)</label>
                    <div class="file-upload" id="file-drop-zone">
                        <input type="file" id="brand-files" multiple accept=".md,.txt" hidden>
                        <p><i class="fas fa-file-alt"></i> Arrastra archivos .md o .txt aquí o <a href="#" id="file-browse">selecciona</a></p>
                        <ul id="file-list"></ul>
                    </div>
                </div>

                <button type="submit" id="btn-generate" class="btn-primary">
                    Generar Campaña
                </button>
            </form>
        </section>

        <!-- Progreso -->
        <section class="card hidden" id="progress-section">
            <h2>Generando Campaña...</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p id="progress-text">Buscando información de la empresa...</p>
            <div class="spinner"></div>
        </section>

        <!-- Resultados -->
        <section class="card hidden" id="results-section">
            <div class="results-header">
                <h2>Resultados</h2>
                <button class="btn-primary" id="btn-download"><i class="fas fa-download"></i> Descargar ZIP</button>
            </div>
            <div class="gallery" id="gallery"></div>
            <button class="btn-secondary" id="btn-new"><i class="fas fa-plus"></i> Nueva Campaña</button>
        </section>
    </main>

    <!-- Modal de edición de conocimiento -->
    <div id="knowledge-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Configurar Agente Creativo</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="brand"><i class="fas fa-building"></i> Agente Brand</button>
                <button class="tab-btn" data-tab="copywriter"><i class="fas fa-pen-fancy"></i> Agente Escritor Creativo</button>
                <button class="tab-btn" data-tab="designer"><i class="fas fa-palette"></i> Agente Diseñador Creativo</button>
            </div>
            <div class="modal-body">
                <textarea id="knowledge-content" placeholder="Edita el contenido aquí..." class="knowledge-editor"></textarea>
                <div class="modal-actions">
                    <button id="save-knowledge" class="btn-primary"><i class="fas fa-save"></i> Guardar Cambios</button>
                    <button id="cancel-knowledge" class="btn-secondary">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>Creado por <a href="https://yeoolabs.com/" target="_blank">yeoolabs.com</a></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
